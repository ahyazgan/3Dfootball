<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a3d1f" />
    <title>Futbol 3D — Hareketle Penaltı</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #061a0e;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      /* Katman 1: canlı kamera (aynalı, soluk) */
      #camera {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        opacity: 0.35;
        z-index: 1;
        background: #000;
      }
      /* Katman 2: 3D sahne (şeffaf) */
      #scene {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
      }
      /* Katman 3: iskelet çizimi (aynalı) */
      #skeleton {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        transform: scaleX(-1);
        z-index: 3;
        pointer-events: none;
      }
      /* Katman 4: HUD */
      #hud {
        position: absolute;
        inset: 0;
        z-index: 4;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <video id="camera" playsinline autoplay muted></video>
      <canvas id="scene"></canvas>
      <canvas id="skeleton"></canvas>
      <div id="hud"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
