name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build:
    name: Tip kontrolü · Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js kur
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Tip kontrolü
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Biçim kontrolü
        run: npm run format:check

      - name: Birim testleri
        run: npm test

      - name: Üretim derlemesi
        run: npm run build
